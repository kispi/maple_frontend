name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/web/maple_frontend
            git checkout main
            git pull
            npm install --include=dev
            npm run build
            pm2 describe maple_frontend > /dev/null 2>&1 \
              && pm2 restart maple_frontend \
              || pm2 start npm --name "maple_frontend" -- start
